# goreleaser config — produces signed, checksum-bundled binaries for
# darwin (arm64+amd64), linux, and windows on every git tag.
#
# Run locally without releasing:
#   goreleaser release --snapshot --clean --skip publish
#
# Cut a release:
#   git tag -a vX.Y.Z -m "vX.Y.Z" && git push origin vX.Y.Z
#   GITHUB_TOKEN=... goreleaser release --clean
version: 2

project_name: hookwave

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: hookwave
    main: ./cmd/hookwave
    binary: hookwave
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Release lands on this repo (Hookwave/cli) — public, so Homebrew can
# anonymously download release artifacts without 404. Goreleaser's
# default is to publish to the repo it ran in, so no cross-repo
# configuration is needed.
release:
  name_template: "CLI {{ .Tag }}"
  header: |
    Hookwave CLI release.

    ```sh
    brew install hookwave/cli/hookwave
    ```

# Homebrew tap. Publishes Formula/hookwave.rb into
# github.com/Hookwave/homebrew-cli on every release so
# `brew install hookwave/cli/hookwave` resolves to the new version.
#
# Requires the release workflow to provide HOMEBREW_TAP_TOKEN — a PAT
# with `repo` scope on the Hookwave org (the default GITHUB_TOKEN can't
# write to a different repo, hence the dedicated token).
brews:
  - name: hookwave
    repository:
      owner: Hookwave
      name: homebrew-cli
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    commit_author:
      name: hookwave-releaser
      email: noreply@hookwave.dev
    commit_msg_template: "chore: hookwave {{ .Tag }}"
    homepage: https://hookwave.dev
    description: Hookwave CLI — reliable webhook infrastructure for AI agents
    license: MIT
    install: |
      bin.install "hookwave"
    test: |
      system "#{bin}/hookwave --version"
